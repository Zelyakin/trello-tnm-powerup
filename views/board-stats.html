<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>T&M Board Statistics</title>
    <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
        body {
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 16px;
            color: var(--tnm-text-primary);
        }

        .stats-overview {
            background-color: var(--tnm-bg-secondary);
            border-radius: 3px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--tnm-border);
        }

        .stats-row:last-child {
            border-bottom: none;
            font-weight: bold;
            font-size: 16px;
            color: var(--tnm-text-accent);
        }

        .stats-label {
            font-weight: bold;
        }

        .stats-value {
            color: var(--tnm-text-accent);
        }

        .period-selector {
            margin-bottom: 20px;
        }

        .period-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .period-btn {
            padding: 6px 12px;
            background-color: var(--tnm-bg-button-secondary);
            color: var(--tnm-text-primary);
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .period-btn.active {
            background-color: var(--tnm-button-primary);
            color: white;
        }

        .period-btn:hover:not(.active) {
            background-color: var(--tnm-bg-button-secondary-hover);
        }

        .loading {
            text-align: center;
            color: var(--tnm-text-secondary);
            padding: 20px;
        }

        .error {
            color: var(--tnm-text-error);
            text-align: center;
            padding: 20px;
        }

        .top-contributors {
            margin-top: 20px;
        }

        .contributor-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            margin-bottom: 4px;
            background-color: var(--tnm-bg-tertiary);
            border-radius: 3px;
            border: 1px solid var(--tnm-border);
        }

        .contributor-name {
            font-weight: bold;
        }

        .contributor-time {
            color: var(--tnm-text-accent);
        }

        .refresh-btn {
            margin-bottom: 20px;
            width: 100%;
        }

        .empty-contributors {
            text-align: center;
            color: var(--tnm-text-secondary);
            font-style: italic;
        }
    </style>
</head>
<body>
<div>
    <h2>Board Time Statistics</h2>

    <button id="refresh-btn" class="mod-primary refresh-btn">Refresh Data</button>

    <div class="period-selector">
        <label><strong>Period:</strong></label>
        <div class="period-buttons">
            <button class="period-btn" data-period="current-month">Current Month</button>
            <button class="period-btn" data-period="last-month">Last Month</button>
            <button class="period-btn" data-period="current-week">Current Week</button>
        </div>
    </div>

    <div id="loading" class="loading">
        Loading statistics...
    </div>

    <div id="error" class="error" style="display: none;">
        Error loading statistics
    </div>

    <div id="stats-content" style="display: none;">
        <div class="stats-overview">
            <div class="stats-row">
                <span class="stats-label">Period:</span>
                <span class="stats-value" id="period-display">-</span>
            </div>
            <div class="stats-row">
                <span class="stats-label">Total time spent:</span>
                <span class="stats-value" id="total-time">-</span>
            </div>
            <div class="stats-row">
                <span class="stats-label">Number of entries:</span>
                <span class="stats-value" id="total-entries">-</span>
            </div>
            <div class="stats-row">
                <span class="stats-label">Active cards:</span>
                <span class="stats-value" id="active-cards">-</span>
            </div>
            <div class="stats-row">
                <span class="stats-label">Average per day:</span>
                <span class="stats-value" id="avg-per-day">-</span>
            </div>
        </div>

        <div class="top-contributors">
            <h3>Top 3 Contributors</h3>
            <div id="contributors-list">
                <!-- Contributors will be inserted here -->
            </div>
        </div>
    </div>
</div>

<script src="../js/supabase-api.js"></script>
<script src="../js/storage.js"></script>
<script>
    const t = TrelloPowerUp.iframe();
    let currentPeriod = 'current-month';

    function showLoading() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('error').style.display = 'none';
        document.getElementById('stats-content').style.display = 'none';
    }

    function showError(message) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = message || 'Error loading statistics';
        document.getElementById('stats-content').style.display = 'none';
    }

    function showStats() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'none';
        document.getElementById('stats-content').style.display = 'block';
    }

    function getPeriodDates(period) {
        const now = new Date();
        let startDate, endDate;

        switch (period) {
            case 'current-month':
                startDate = new Date(now.getFullYear(), now.getMonth(), 1);
                endDate = new Date(now.getFullYear(), now.getMonth() + 1, 0);
                break;
            case 'last-month':
                startDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                endDate = new Date(now.getFullYear(), now.getMonth(), 0);
                break;
            case 'current-week':
                const dayOfWeek = now.getDay();
                const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
                startDate = new Date(now);
                startDate.setDate(now.getDate() + mondayOffset);
                startDate.setHours(0, 0, 0, 0);
                endDate = new Date(startDate);
                endDate.setDate(startDate.getDate() + 6);
                endDate.setHours(23, 59, 59, 999);
                break;
        }

        return { startDate, endDate };
    }

    function formatDateForAPI(date) {
        if (!date) return null;
        // getPeriodDates строит границы в ЛОКАЛЬНОМ времени, а work_date в БД — локальная
        // календарная дата. toISOString() дал бы UTC-сдвиг границ на день (тот же класс TZ-бага,
        // что и в formatDate) и сместил бы gte/lte-фильтр периода. Сериализуем локальный день.
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function isDateInRange(dateString, startDate, endDate) {
        if (!dateString) return false;

        const date = new Date(dateString);
        if (isNaN(date.getTime())) return false;

        if (startDate && date < startDate) return false;
        if (endDate && date > endDate) return false;

        return true;
    }

    function calculateDaysBetween(startDate, endDate) {
        if (!startDate || !endDate) return 1;
        const diffTime = Math.abs(endDate - startDate);
        return Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
    }

    function getPeriodDisplayName(period) {
        const { startDate, endDate } = getPeriodDates(period);

        switch (period) {
            case 'current-month':
                return `${startDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}`;
            case 'last-month':
                return `${startDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}`;
            case 'current-week':
                return `Week ${startDate.toLocaleDateString()} - ${endDate.toLocaleDateString()}`;
            default:
                return period;
        }
    }

    async function loadBoardStats() {
        try {
            showLoading();

            const { startDate, endDate } = getPeriodDates(currentPeriod);

            // Get board ID and settings
            const board = await t.board('id');
            const settings = await SupabaseAPI.getBoardSettings(board.id);
            const hoursPerDay = settings.hours_per_day || 8;

            // Use optimized getBoardStats method - makes only 2-3 requests instead of N requests
            const stats = await SupabaseAPI.getBoardStats(
                board.id,
                formatDateForAPI(startDate),
                formatDateForAPI(endDate)
            );

            // Calculate average per day
            const periodDays = calculateDaysBetween(startDate, endDate);
            const avgMinutesPerDay = Math.floor(stats.totalMinutes / periodDays);

            // Update UI
            document.getElementById('period-display').textContent = getPeriodDisplayName(currentPeriod);
            document.getElementById('total-time').textContent = TnMStorage.formatTime(stats.totalMinutes, hoursPerDay);
            document.getElementById('total-entries').textContent = stats.totalEntries;
            document.getElementById('active-cards').textContent = stats.activeCards;
            document.getElementById('avg-per-day').textContent = TnMStorage.formatTime(avgMinutesPerDay, hoursPerDay);

            // Render contributors
            const contributorsList = document.getElementById('contributors-list');
            contributorsList.innerHTML = '';

            if (stats.contributors.length === 0) {
                contributorsList.innerHTML = '<div class="empty-contributors">No data for selected period</div>';
            } else {
                // contributors array is already sorted and limited to top 3 by the API
                stats.contributors.forEach(({ memberName, totalMinutes }) => {
                    const contributorDiv = document.createElement('div');
                    contributorDiv.className = 'contributor-item';
                    contributorDiv.innerHTML = `
                        <div class="contributor-name">${memberName}</div>
                        <div class="contributor-time">${TnMStorage.formatTime(totalMinutes, hoursPerDay)}</div>
                    `;
                    contributorsList.appendChild(contributorDiv);
                });
            }

            showStats();

        } catch (error) {
            console.error('Error loading board stats:', error);
            showError('Error loading statistics: ' + error.message);
        }
    }

    // Event listeners
    document.addEventListener('DOMContentLoaded', function() {
        // Set default period
        document.querySelector(`[data-period="${currentPeriod}"]`).classList.add('active');

        loadBoardStats();

        // Period selection
        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentPeriod = this.dataset.period;
                loadBoardStats();
            });
        });

        // Refresh button
        document.getElementById('refresh-btn').addEventListener('click', function() {
            loadBoardStats();
        });
    });
</script>
</body>
</html>
