<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>T&M Information</title>
    <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
        /* Additional styles for card back */
        .back-section {
            padding: 8px;
        }

        .tnm-info-block {
            background-color: var(--tnm-bg-secondary);
            border-radius: 3px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .tnm-time-title {
            font-weight: bold;
            margin: 12px 0 8px 0;
            border-bottom: 1px solid var(--tnm-border);
            padding-bottom: 4px;
        }

        .tnm-time-entry {
            padding: 8px 0;
            border-bottom: 1px solid var(--tnm-border);
            font-size: 13px;
        }

        .tnm-time-header {
            display: flex;
            justify-content: space-between;
        }

        .tnm-time-date {
            color: var(--tnm-text-secondary);
            font-size: 12px;
        }

        .tnm-time-user {
            font-weight: bold;
        }

        .tnm-time-hours {
            color: var(--tnm-text-accent);
            font-weight: bold;
        }

        .tnm-time-description {
            margin-top: 4px;
            font-size: 12px;
            color: var(--tnm-text-primary);
        }

        .tnm-time-total {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-weight: bold;
            border-top: 2px solid var(--tnm-border);
            margin-top: 4px;
        }

        .tnm-footer {
            font-size: 11px;
            color: var(--tnm-text-secondary);
            text-align: right;
            margin-top: 12px;
        }

        .tnm-empty-state {
            padding: 12px;
            text-align: center;
            color: var(--tnm-text-secondary);
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="back-section">
    <div class="tnm-time-title">Time spent:</div>
    <div id="time-entries-list">
        <div class="tnm-empty-state">Loading data...</div>
    </div>

    <div class="tnm-footer">
        <a href="#" id="open-details">View full information</a>
    </div>
</div>

<script src="../js/supabase-api.js"></script>
<script src="../js/storage.js"></script>
<script>
    const t = TrelloPowerUp.iframe();

    // Флаг для предотвращения множественных одновременных загрузок
    let isLoading = false;
    let lastUpdateTimestamp = 0;

    // Date formatting function
    function formatDate(dateString) {
        if (!dateString) return '';
        // work_date — календарная дата без TZ; date-only парсим как локальную дату,
        // иначе new Date() трактует её как UTC-полночь и день сдвигается назад западнее UTC.
        // Якорь на $ — чтобы полные таймстемпы (created_at) шли через new Date(), а не резались.
        const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(dateString);
        const date = m ? new Date(+m[1], +m[2] - 1, +m[3]) : new Date(dateString);
        if (isNaN(date.getTime())) return '';
        return date.toLocaleDateString();
    }

    // Handler for opening detailed information
    function setupDetailLink() {
        const detailLink = document.getElementById('open-details');
        if (detailLink) {
            detailLink.addEventListener('click', function(e) {
                e.preventDefault();
                t.popup({
                    title: 'Time Tracking',
                    url: t.signUrl('./card-detail.html'),
                    height: 400
                });
            });
        }
    }

    // Load data with protection from simultaneous calls
    async function loadData() {
        // Защита от одновременных вызовов
        if (isLoading) {
            console.log('Already loading data, skipping...');
            return;
        }

        isLoading = true;

        try {
            const data = await TnMStorage.getCardData(t);
            const hoursPerDay = data.hoursPerDay || 8;
            const timeEntriesList = document.getElementById('time-entries-list');

            // Filter only time entries
            const timeEntries = data.history ? data.history.filter(entry => entry.type === 'time') : [];

            if (timeEntries.length > 0) {
                // Sort by date (newest to oldest)
                timeEntries.sort((a, b) => new Date(b.workDate || b.date || b.created_at) - new Date(a.workDate || a.date || a.created_at));

                let entriesHTML = '';

                // Limit number of entries to 5 for compactness
                const displayEntries = timeEntries.slice(0, 5);

                // Display each entry
                displayEntries.forEach(function(entry) {
                    // Use work date if available
                    const displayDate = entry.workDate ? formatDate(entry.workDate) : formatDate(entry.date || entry.created_at);

                    entriesHTML += `
                        <div class="tnm-time-entry">
                            <div class="tnm-time-header">
                                <div>
                                    <span class="tnm-time-date">${displayDate}</span>
                                    <span class="tnm-time-user">${entry.memberName || entry.member_name || 'User'}</span>
                                </div>
                                <div class="tnm-time-hours">${TnMStorage.formatTime(entry.timeMinutes || 0, hoursPerDay)}</div>
                            </div>
                            ${entry.description ? `<div class="tnm-time-description">${entry.description}</div>` : ''}
                        </div>
                    `;
                });

                // Add information about hidden entries, if any
                if (timeEntries.length > 5) {
                    entriesHTML += `
                        <div class="tnm-empty-state">
                            ...and ${timeEntries.length - 5} more ${timeEntries.length - 5 === 1 ? 'entry' : 'entries'}
                        </div>
                    `;
                }

                // Add total row
                entriesHTML += `
                    <div class="tnm-time-total">
                        <div>TOTAL:</div>
                        <div>${TnMStorage.formatTime(data.timeMinutes || 0, hoursPerDay)}</div>
                    </div>
                `;

                timeEntriesList.innerHTML = entriesHTML;
            } else {
                timeEntriesList.innerHTML = '<div class="tnm-empty-state">No time tracking records</div>';
            }
        } catch (err) {
            console.error('Error loading data:', err);
            document.getElementById('time-entries-list').innerHTML =
                '<div class="tnm-empty-state">Error loading data</div>';
        } finally {
            isLoading = false;
        }
    }

    // Check for updates periodically
    async function checkForUpdates() {
        try {
            const newLastUpdate = await t.get('card', 'shared', 'tnm-lastUpdate', 0);

            if (newLastUpdate !== lastUpdateTimestamp && newLastUpdate > 0) {
                console.log('Data updated, reloading...');
                lastUpdateTimestamp = newLastUpdate;
                await loadData();
            }
        } catch (error) {
            console.error('Error checking for updates:', error);
        }
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', async function() {
        setupDetailLink();

        // Initial load
        await loadData();

        // Get initial timestamp
        lastUpdateTimestamp = await t.get('card', 'shared', 'tnm-lastUpdate', 0);

        // Check for updates every 5 seconds (was 2 seconds)
        setInterval(checkForUpdates, 5000);
    });

    // Handle Trello's render events
    // Но НЕ загружаем данные повторно, если уже загрузили
    t.render(function() {
        // Просто обновляем ссылку, если DOM перестроился
        setupDetailLink();
    });
</script>
</body>
</html>
